<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Metronome</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #11161f;
      --card: #1d2633;
      --accent: #37c2b1;
      --text: #f6faff;
      --text-subtle: #a9b4c6;
      --danger: #ff6b6b;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, rgba(55, 194, 177, 0.25), rgba(17, 22, 31, 0.95));
      color: var(--text);
    }

    .app {
      width: min(420px, calc(100vw - 32px));
      padding: 24px 20px 28px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      display: grid;
      row-gap: 24px;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.04em;
    }

    .tempo-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      column-gap: 8px;
      margin-top: 16px;
      font-weight: 600;
    }

    .tempo-display span.value {
      font-size: clamp(3.5rem, 12vw, 4.6rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .tempo-display span.unit {
      font-size: 1.1rem;
      color: var(--text-subtle);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .controls button {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 18px 0;
      font-size: 1.6rem;
      font-weight: 600;
      background: rgba(55, 194, 177, 0.12);
      color: var(--text);
      transition: transform 0.1s ease, background 0.15s ease;
      touch-action: manipulation;
    }

    .controls button:active {
      transform: translateY(1px) scale(0.98);
    }

    .controls button.special {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.08);
    }

    .controls button.special.danger {
      background: rgba(255, 107, 107, 0.22);
      color: #ffe4e4;
    }

    .playback {
      display: flex;
      justify-content: center;
    }

    .playback button {
      width: 100%;
      max-width: 280px;
      border: none;
      border-radius: 999px;
      padding: 16px 18px;
      font-size: 1.3rem;
      font-weight: 600;
      background: var(--accent);
      color: #031310;
      display: flex;
      align-items: center;
      justify-content: center;
      column-gap: 10px;
      transition: transform 0.12s ease, filter 0.15s ease;
      touch-action: manipulation;
    }

    .playback button:active {
      transform: translateY(1px) scale(0.99);
    }

    .playback svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #1c232f;
        --text-subtle: #626f82;
        --accent: #0caea4;
      }

      body {
        background: radial-gradient(circle at top, rgba(12, 174, 164, 0.18), rgba(12, 16, 26, 0.25));
      }

      .controls button {
        background: rgba(12, 174, 164, 0.12);
      }

      .controls button.special {
        background: rgba(0, 0, 0, 0.05);
      }

      .controls button.special.danger {
        color: #6d0404;
        background: rgba(255, 107, 107, 0.15);
      }

      .playback button {
        color: white;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Pulse</h1>
      <div class="tempo-display" aria-live="polite" aria-atomic="true">
        <span class="value" id="tempo-value">120</span>
        <span class="unit">BPM</span>
      </div>
    </header>

    <section class="controls" aria-label="Tempo keypad">
      <button data-key="1">1</button>
      <button data-key="2">2</button>
      <button data-key="3">3</button>
      <button data-key="4">4</button>
      <button data-key="5">5</button>
      <button data-key="6">6</button>
      <button data-key="7">7</button>
      <button data-key="8">8</button>
      <button data-key="9">9</button>
      <button class="special" data-key="CLR">CLR</button>
      <button data-key="0">0</button>
      <button class="special danger" data-key="DEL">DEL</button>
    </section>

    <section class="playback">
      <button id="play-toggle" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path id="play-icon" d="M8 5v14l11-7z" />
        </svg>
        <span id="play-label">Play</span>
      </button>
    </section>
  </div>

  <script>
    (() => {
      const DEFAULT_TEMPO = 120;
      const MIN_TEMPO = 10;
      const MAX_TEMPO = 300;
      const LOOKAHEAD = 25; // ms between scheduler runs
      const SCHEDULE_AHEAD_TIME = 0.1; // seconds to schedule ahead

      const tempoDisplay = document.getElementById("tempo-value");
      const keypad = document.querySelector(".controls");
      const playToggle = document.getElementById("play-toggle");
      const playLabel = document.getElementById("play-label");
      const playIcon = document.getElementById("play-icon");

      let audioCtx;
      let isPlaying = false;
      let nextTickTime = 0;
      let timerId = null;
      let tempo = DEFAULT_TEMPO;
      let tempoBuffer = String(DEFAULT_TEMPO);

      function ensureAudioCtx() {
        if (!audioCtx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AudioCtx();
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      }

      function updateTempoDisplay() {
        tempoDisplay.textContent = tempoBuffer || String(tempo);
      }

      function applyTempoFromBuffer() {
        const numeric = parseInt(tempoBuffer, 10);
        if (Number.isNaN(numeric)) {
          updateTempoDisplay();
          return;
        }

        if (numeric > MAX_TEMPO) {
          tempo = MAX_TEMPO;
          tempoBuffer = String(MAX_TEMPO);
        } else if (numeric >= MIN_TEMPO) {
          tempo = numeric;
        }

        updateTempoDisplay();
      }

      function handleKeypadInput(key) {
        if (key === "CLR") {
          tempo = DEFAULT_TEMPO;
          tempoBuffer = "";
          updateTempoDisplay();
          return;
        }

        if (key === "DEL") {
          tempoBuffer = tempoBuffer.slice(0, -1);
          applyTempoFromBuffer();
          return;
        }

        if (tempoBuffer.length >= 3) {
          return;
        }

        tempoBuffer += key;
        if (tempoBuffer.length > 1) {
          tempoBuffer = tempoBuffer.replace(/^0+/, "");
          if (tempoBuffer === "") {
            tempoBuffer = "0";
          }
        }
        applyTempoFromBuffer();
      }

      function scheduleTick(time) {
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();

        osc.frequency.value = 1000;
        envelope.gain.setValueAtTime(1, time);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

        osc.connect(envelope);
        envelope.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.05);
      }

      function scheduler() {
        if (!isPlaying) {
          return;
        }

        while (nextTickTime < audioCtx.currentTime + SCHEDULE_AHEAD_TIME) {
          scheduleTick(nextTickTime);
          const secondsPerBeat = 60 / tempo;
          nextTickTime += secondsPerBeat;
        }

        timerId = window.setTimeout(scheduler, LOOKAHEAD);
      }

      function startMetronome() {
        ensureAudioCtx();
        nextTickTime = audioCtx.currentTime;
        isPlaying = true;
        scheduler();
        updatePlayButton();
      }

      function stopMetronome() {
        isPlaying = false;
        if (timerId) {
          window.clearTimeout(timerId);
          timerId = null;
        }
        updatePlayButton();
      }

      function updatePlayButton() {
        if (isPlaying) {
          playLabel.textContent = "Pause";
          playIcon.setAttribute("d", "M7 5h3v14H7zm7 0h3v14h-3z");
        } else {
          playLabel.textContent = "Play";
          playIcon.setAttribute("d", "M8 5v14l11-7z");
        }
      }

      keypad.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-key]");
        if (!button) {
          return;
        }
        handleKeypadInput(button.dataset.key);
      });

      playToggle.addEventListener("click", () => {
        if (isPlaying) {
          stopMetronome();
        } else {
          startMetronome();
        }
      });

      // Update icon and display on load
      updatePlayButton();
      updateTempoDisplay();
    })();
  </script>
</body>
</html>
